<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geek23 | Nuclear Physics</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 90%;
      text-align: center;
    }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #ccc;
      margin: 0 auto 1rem;
      background-size: cover;
      background-position: center;
    }
    h1 {
      margin: 0.5rem 0 0.2rem;
    }
    h2 {
      margin: 0;
      font-weight: 400;
      color: #555;
    }
    p.tagline {
      margin: 1rem 0;
      color: #666;
      font-style: italic;
    }
    .links a {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      text-decoration: none;
      background: #007acc;
      color: white;
      border-radius: 6px;
      transition: background 0.3s ease;
    }
    .links a:hover {
      background: #005f99;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-pic" style="background-image: url('profile.jpg');"></div>
    <h1>Geek23</h1>

    <div class="links">
