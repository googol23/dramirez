<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dario Ramirez | Nuclear Physicist</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@300&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Open Sans', sans-serif; margin: 1rem; max-width: 900px; }
    #top-bar { position: fixed; top: 0; right: 0; padding: 0.5rem; background: #333; z-index: 1000; }
    #top-bar button {
      margin-left: 1rem; color: white; background: #007acc; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px;
    }
    #top-bar button:hover { background: #005fa3; }
    header .profile {
      display: flex; align-items: center; gap: 1rem; margin-top: 3rem; border-bottom: 2px solid #007acc; padding-bottom: 1rem;
    }
    header img { width: 120px; border-radius: 50%; }
    h1 { margin: 0; }
    h2 { margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 0.3rem; }
    section ul { padding-left: 1.2rem; }
    details summary { cursor: pointer; font-weight: bold; margin-top: 0.3rem; }
    a { color: #007acc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .small-text { font-size: 0.9em; color: #555; }
  </style>
</head>
<body>

  <div id="top-bar">
    <button onclick="window.location.href='mailto:d.ramirez@gsi.de'">Contact</button>
    <button onclick="exportToPDF()">Download CV</button>
  </div>

  <header id="profile"></header>

  <main id="content"></main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    async function loadData() {
      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('Failed to load data.json');
        const data = await res.json();

        // Profile
        const profile = data.profile;
        document.getElementById('profile').innerHTML = `
          <div class="profile">
            <img src="${profile.image}" alt="Profile Image" />
            <div>
              <h1>${profile.name}</h1>
              <p>${profile.affiliations}</p>
              <p>Email: <a href="mailto:${profile.email}">${profile.email}</a> | Gmail: <a href="mailto:${profile.gmail}">${profile.gmail}</a></p>
              <p>Born: ${profile.birth}</p>
            </div>
          </div>`;

        // Content
        const content = document.getElementById('content');

        // Education
        let html = '<section><h2>Education</h2><ul>';
        data.education.forEach(edu => {
          html += `<li><strong>${edu.degree}</strong> – ${edu.place} (${edu.period})`;
          html += '<details><summary>Show more</summary><ul>';
          if (edu.details.thesis) html += `<li>Thesis: ${edu.details.thesis}</li>`;
          if (edu.details.supervisor) html += `<li>Supervisor: ${edu.details.supervisor}</li>`;
          html += '</ul></details></li>';
        });
        html += '</ul></section>';

        // Summer Schools & Internships
        html += '<section><h2>Summer Schools & Internships</h2><ul>';
        data.summerSchoolsInternships.forEach(item => {
          html += `<li>${item.period} – ${item.place}`;
          html += '<details><summary>Show more</summary><ul>';
          if (item.details.workReport) html += `<li>Work report: ${item.details.workReport}</li>`;
          if (item.details.workTopic) html += `<li>Work topic: ${item.details.workTopic}</li>`;
          if (item.details.supervisor) html += `<li>Supervisor: ${item.details.supervisor}</li>`;
          html += '</ul></details></li>';
        });
        html += '</ul></section>';

        // Professional Experience
        html += '<section><h2>Professional Experience</h2><ul>';
        data.professionalExperience.forEach(exp => {
          html += `<li><strong>${exp.degree}</strong> – ${exp.place} (${exp.period})`;
          if (exp.details.summary) html += `<br><span class="small-text">${exp.details.summary}</span>`;
          html += '</li>';
        });
        html += '</ul></section>';

        // Conference Participation
        html += '<section><h2>Conference Participation</h2>';
        html += '<details open><summary>Recent</summary><ul>';
        data.conferenceParticipation.recent.forEach(item => {
          html += `<li>${item}</li>`;
        });
        html += '</ul></details>';

        html += '<details><summary>More</summary><ul>';
        data.conferenceParticipation.more.forEach(item => {
          html += `<li>${item}</li>`;
        });
        html += '</ul></details></section>';

        // Publications
        html += '<section><h2>Publications</h2>';
        html += '<details open><summary>Conference Proceedings</summary><ul>';
        data.publications.conferenceProceedings.forEach(pub => {
          html += `<li>${pub}</li>`;
        });
        html += '</ul></details>';

        html += '<details><summary>Journal</summary><ul>';
        data.publications.journal.forEach(pub => {
          html += `<li>${pub}</li>`;
        });
        html += '</ul></details>';

        html += '<details><summary>Technical Reports</summary><ul>';
        data.publications.technicalReports.forEach(pub => {
          html += `<li>${pub}</li>`;
        });
        html += '</ul></details></section>';

        // Skills Summary
        html += '<section><h2>Skills Summary</h2><ul>';
        data.skillsSummary.forEach(skill => {
          html += `<li>${skill}</li>`;
        });
        html += '</ul></section>';

        // Awards
        html += '<section><h2>Awards</h2><ul>';
        data.awards.forEach(award => {
          html += `<li>${award}</li>`;
        });
        html += '</ul></section>';

        content.innerHTML = html;

      } catch (err) {
        document.getElementById('content').innerText = 'Error loading data: ' + err.message;
      }
    }

    function exportToPDF() {
      const element = document.body;
      const opt = {
        margin:       0.5,
        filename:     'Dario_Ramirez_CV.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    loadData();
  </script>

</body>
</html>
